name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the local/Docker toolchain (Node 24, pnpm reading lockfileVersion 9.0).
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  lint-build-unit:
    name: Lint, build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  integration-e2e:
    name: Integration & e2e tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: lint-build-unit
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ubuntu-latest ships a running Docker daemon; Testcontainers uses it directly
      # to spin up throwaway Postgres / RabbitMQ / Mailpit containers per suite.
      - name: Integration tests
        run: pnpm test:integration

      - name: End-to-end tests
        run: pnpm test:e2e
