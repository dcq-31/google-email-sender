services:
  postgres:
    image: postgres:17.5-alpine3.21
    container_name: ges_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-email_sender}
    # Host port publishing lives in docker-compose.override.yml (auto-loaded for local dev)
    # so production (`-f docker-compose.yml -f docker-compose.prod.yml`) keeps the DB internal.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-email_sender}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ges_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    # Host port publishing (AMQP + management UI) lives in docker-compose.override.yml
    # (auto-loaded for local dev) so production keeps the broker internal.
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: apply migrations against the compiled dist/ data source, then exit.
  # Runs the TypeORM CLI directly via node so the runtime image needs no pnpm/ts-node.
  # Keeps schema changes out of app boot (migrationsRun:false / synchronize:false).
  migrate:
    build: .
    image: google-email-sender
    container_name: ges_migrate
    command: ["node", "node_modules/typeorm/cli.js", "migration:run", "-d", "dist/database/data-source.js"]
    environment:
      # In the compose network the DB host is the service name, not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-email_sender}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    image: google-email-sender
    container_name: ges_app
    restart: unless-stopped
    # SMTP_* and behavior knobs come from .env; the two URLs below override the
    # localhost values in .env because in-network hosts are the service names.
    env_file: .env
    environment:
      HTTP_PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-email_sender}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    ports:
      - "${HTTP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Optional local SMTP catcher for dev — not started by the default `up` (opt-in via its profile).
  # Start with:  docker compose --profile mail up -d mailpit
  # Then point the app at it:  SMTP_HOST=localhost SMTP_PORT=1025 SMTP_SECURE=false
  # Web UI / REST API: http://localhost:8025
  mailpit:
    image: axllent/mailpit:v1.20
    container_name: ges_mailpit
    restart: unless-stopped
    profiles: ["mail"]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # HTTP UI / API

volumes:
  pgdata:
